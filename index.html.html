<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PUBG 来电</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei";
}

body{

height:100vh;

background:#111;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

color:white;
}

.bg{

position:absolute;

width:100%;

height:100%;

background:

radial-gradient(circle,#4b2b1f,#111);

animation: breathe 4s infinite;
}

@keyframes breathe{

0%{
transform:scale(1);
filter:brightness(0.8);
}

50%{
transform:scale(1.1);
filter:brightness(1.3);
}

100%{
transform:scale(1);
filter:brightness(0.8);
}

}

.container{

z-index:2;

text-align:center;
}

.logo{

width:140px;

height:140px;

background:#ffd400;

margin:auto;

border-radius:15px;

display:flex;

justify-content:center;

align-items:center;

font-size:60px;

font-weight:bold;

color:black;
}

.title{

font-size:55px;

margin:20px 0;
}

.tip{

font-size:24px;

opacity:.8;

margin-bottom:120px;
}

.buttons{

display:flex;

gap:120px;

justify-content:center;
}

.btn{

width:110px;

height:110px;

border-radius:50%;

border:none;

font-size:24px;

cursor:pointer;

color:white;

animation: pulse 1.5s infinite;
}

.red{
background:#ff4d4d;
}

.green{
background:#00d85f;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.1);
}

100%{
transform:scale(1);
}

}

#timer{

font-size:38px;

display:none;

margin-top:30px;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="logo">🎮</div>

<div class="title">PUBG</div>

<div class="tip" id="status">
邀请你语音通话...
</div>

<div class="buttons">

<button class="btn red"
onclick="hangup()">

Roll点

</button>

<button class="btn green"
onclick="answer()">

运营

</button>

</div>

<div id="timer">

00:00

</div>

</div>

<audio id="ring" loop>

<source src="ring.mp3">

</audio>

<script>

let sec=0;

let timer;

window.onload=()=>{

document.body.onclick=()=>{

document.getElementById('ring').play();

};

};

function answer(){

document.getElementById('ring').pause();

document.getElementById('status').innerHTML='语音通话中';

document.getElementById('timer').style.display='block';

timer=setInterval(()=>{

sec++;

let m=Math.floor(sec/60);

let s=sec%60;

document.getElementById('timer').innerHTML=

String(m).padStart(2,'0')

+':'+

String(s).padStart(2,'0');

},1000);

}

function hangup(){

clearInterval(timer);

document.getElementById('status').innerHTML='通话结束';

document.getElementById('ring').pause();

}

</script>

</body>

</html>
